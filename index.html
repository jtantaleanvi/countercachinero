<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTRA 8-BIT EDITION</title>
    <style>
        body { background: #050505; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #333; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
        canvas { display: block; background: linear-gradient(to bottom, #000022 0%, #000 100%); }
        .hint { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="overlay" onclick="start()">
            <h1 style="color:red; font-size: 40px; margin:0;">CONTRA 8-BIT</h1>
            <p>CLICK PARA EMPEZAR</p>
            <div class="hint">FLECHAS: Mover | Z: Saltar | X: Disparar | 1-3: Armas</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
