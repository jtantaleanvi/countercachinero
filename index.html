<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTRA: ALIEN WARS</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #333; background: #000; width: 800px; height: 450px; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; z-index: 10; pointer-events: none; color: white; text-shadow: 2px 2px #000; }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; border: 2px solid red; }
        canvas { display: block; background: #000022; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay" onclick="iniciarJuego()">
            <h1 style="color:red; font-size: 50px; margin:0;">CONTRA JS</h1>
            <p style="color:white; font-size: 20px;">¡HAZ CLIC AQUÍ PARA JUGAR!</p>
            <div style="color:#888; font-size: 12px; margin-top: 20px;">
                FLECHAS: Mover | Z: Saltar | X: Disparar | 1, 2, 3: Armas
            </div>
        </div>
        <div id="hud">
            <div>SCORE: <span id="sc-val">0</span></div>
            <div>VIDA: <span id="hp-val">100</span>%</div>
            <div>ARMA: <span id="wp-val">RIFLE</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
