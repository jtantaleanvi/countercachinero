<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRA: ALIEN WARS JS</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; text-transform: uppercase; }
        #game-container { position: relative; border: 4px solid #333; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; color: #fff; text-shadow: 2px 2px 0 #000; z-index: 10; pointer-events: none; }
        #score-val { color: #0f0; } /* Score en verde */
        #hp-val { color: #f00; }    /* Vida en rojo */
        #start-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: red; z-index: 20; cursor: pointer; }
        #start-overlay h1 { font-size: 48px; margin: 0 0 20px 0; }
        canvas { background: linear-gradient(to bottom, #000033 0%, #000000 100%); display: block; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay">
            <h1>CONTRA JS</h1>
            <p style="color:white;">HAZ CLIC PARA EMPEZAR</p>
            <p style="color:#aaa; font-size:12px; margin-top:30px;">CONTROLES: flechas (mover), Z (saltar), X (disparar)</p>
            <p style="color:#aaa; font-size:12px;">armas: 1 (rifle), 2 (spread), 3 (m-gun)</p>
        </div>
        <div id="hud">
            <div>P1: <span id="score-val">00000</span></div>
            <div>VIDA: <span id="hp-val">100</span>%</div>
            <div>ARMA: <span id="weapon-val">RIFLE</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
