<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contra Clone - Beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <div id="ui">
            <span id="health-display">Salud: 100</span>
            <span id="weapon-display">Arma: Rifle</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <p><strong>Mover:</strong> Flechas | <strong>Saltar:</strong> Z | <strong>Disparar:</strong> X</p>
            <p><strong>Cambiar Arma:</strong> 1 (Rifle), 2 (Spread), 3 (Metralleta)</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
