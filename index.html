<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTRA: THE ALIEN WARS JS</title>
    <style>
        body { background: #050505; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-wrapper { position: relative; border: 8px solid #222; box-shadow: 0 0 50px rgba(255,0,0,0.4); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; color: #0f0; text-shadow: 2px 2px #000; pointer-events: none; }
        canvas { background: linear-gradient(to bottom, #000033 0%, #000 100%); display: block; }
        .blink { animation: blinker 1s linear infinite; color: yellow; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="overlay" onclick="startReady()">
            <h1 style="color:red; font-size: 50px; text-shadow: 3px 3px white;">CONTRA JS</h1>
            <p class="blink">PULSA PARA LUCHAR</p>
            <p style="font-size: 12px; color: #aaa;">WASD/FLECHAS: Mover | Z/SPACE: Saltar | X: Disparar | 1-3: Armas</p>
        </div>
        <div id="hud">
            <div>SC: <span id="sc">0</span></div>
            <div>HP: <span id="hp">100</span>%</div>
            <div>GUN: <span id="gun">RIFLE</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
