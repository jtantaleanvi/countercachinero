<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTRA JS - DEFINITIVE EDITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-wrapper">
        <div id="overlay" onclick="iniciarJuego()">
            <h1>CONTRA JS</h1>
            <div class="btn-play">INSERT COIN (CLIC AQUÍ)</div>
            <p class="controls">WASD / FLECHAS: Mover | Z: Saltar | X: Disparar | 1, 2, 3: Armas</p>
        </div>

        <div id="hud">
            <div>PUNTOS: <span id="sc-val">0</span></div>
            <div>VIDA: <span id="hp-val">100</span>%</div>
            <div>ARMA: <span id="wp-val">RIFLE</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="crt-effect"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
