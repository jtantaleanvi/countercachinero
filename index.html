<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTRA JS - FIX</title>
    <style>
        body { background: #000; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 450px; border: 4px solid #333; background: #000; }
        
        /* EL BOTÓN DE INICIO: Ahora es lo más importante */
        #start-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 999; /* El número más alto para que nada lo tape */
            cursor: pointer; 
        }

        #hud { 
            position: absolute; top: 10px; width: 100%; 
            display: flex; justify-content: space-around; 
            z-index: 10; pointer-events: none; /* Esto evita que el HUD bloquee clics */
            color: #0f0; font-weight: bold; text-shadow: 2px 2px #000;
        }

        canvas { display: block; background: #001; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay" onclick="iniciarJuego()">
            <h1 style="color:red; font-size: 50px; margin:0;">CONTRA JS</h1>
            <p style="color:white; font-size: 20px; border: 2px solid white; padding: 10px;">CLIC AQUÍ PARA JUGAR</p>
            <p style="color:#888; font-size: 12px; margin-top: 20px;">1, 2, 3: CAMBIAR ARMAS | X: DISPARAR | Z: SALTAR</p>
        </div>

        <div id="hud">
            <div>SCORE: <span id="sc-val">0</span></div>
            <div>HP: <span id="hp-val">100</span>%</div>
            <div>ARMA: <span id="wp-val">RIFLE</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
